; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; --- Shared base for all nodes ---
; USB CDC flags required for ESP32-S3 native USB serial (not needed on original ESP32)
[env]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_filters = time
monitor_speed = 115200
; upload_speed=115200
lib_deps =
	links2004/WebSockets@^2.7.1
	bblanchon/ArduinoJson@^7.4.2
	adafruit/Adafruit BusIO @ ^1.17.4
	adafruit/RTClib@^2.1.4
	mikalhart/TinyGPSPlus@^1.1.0
	adafruit/Adafruit BNO055@^1.6.4
	adafruit/Adafruit Unified Sensor@^1.1.14
build_flags =
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1


; Unified node: one binary for Front, Rear, and BAMO boards.
; Each board runs every sensor init at boot; unconnected hardware logs zeros.
[env:Node]
build_src_filter = -<*>+<node_unified.cpp>

; AMS node — overrides base: needs larger flash (16MB), FatFS, and OPI PSRAM
[env:ams]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
build_src_filter = -<*>+<*node_ams.cpp>
build_flags =
	${env.build_flags}
	-D CONFIG_FATFS_MAX_LFN=255       ; allow long filenames on FatFS
	-D CONFIG_LITTLEFS_FOR_IDF_3_2=1
	-I${PLATFORMIO_BUILD_DIR}/..
board_build.partitions = huge_app.csv ; larger app partition for AMS firmware size
board_build.filesystem = fatfs
board_upload.flash_size = 16MB
board_build.arduino.memory_type = qio_opi ; OPI PSRAM mode, S3-specific
lib_deps =
	${env.lib_deps}

[platformio]
description = Sensor Node
